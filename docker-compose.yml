services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      # Automatically pass all variables from .env.local to the Dockerfile ARGs
      args:
        - NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
    container_name: taimstem-web
    restart: always
    ports:
      - "3500:3000"
    environment:
      - NODE_ENV=production
    env_file:
      - .env.local
